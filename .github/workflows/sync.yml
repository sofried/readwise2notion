name: Readwise to Notion Sync

on:
  # Run every hour from 5 AM to 5 PM CST (11 AM to 11 PM UTC)
  schedule:
    - cron: '0 11-23 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

env:
  # 强制所有 Action 使用 Node.js 24 运行，消除淘汰警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # 升级至 v6

      - name: Restore synced items cache
        uses: actions/cache@v5 # 升级至 v5
        with:
          path: |
            .last_sync_time.json
            .synced_items.json
          # 使用更通用的 key，方便下次运行提取
          key: readwise-sync-state-${{ runner.os }}-${{ github.run_attempt }}
          restore-keys: |
            readwise-sync-state-${{ runner.os }}-
            readwise-sync-state-

      - name: Set up Python
        uses: actions/setup-python@v6 # 升级至 v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run sync script
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DAYS_TO_SYNC: ${{ secrets.DAYS_TO_SYNC }}
        run: |
          python readwise_notion_sync.py

      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: |
            *.log
            *.txt
